<div class="modal" id="consultation-modal" role="dialog" aria-modal="true" aria-labelledby="consultation-modal-title" hidden>
  <div class="modal-overlay" data-modal-close></div>
  <div class="modal-dialog" role="document">
    <button type="button" class="modal-close" data-modal-close aria-label="{{ modal_close }}">&times;</button>
    <h2 class="modal-title" id="consultation-modal-title">{{ modal_title }}</h2>
    <p class="modal-subtitle">{{ modal_subtitle }}</p>
    <div class="modal-options">
      <a href="{{ clinic_bratislava_booking_url }}" class="modal-option" target="_blank" rel="noopener" data-clinic="bratislava">
        <span class="modal-option-flag" aria-hidden="true">{{ clinic_bratislava_flag }}</span>
        <span class="modal-option-text">
          <span class="modal-option-name">{{ clinic_bratislava_name }}</span>
          <span class="modal-option-city">{{ clinic_bratislava_city }}</span>
        </span>
        <span class="modal-option-arrow" aria-hidden="true">→</span>
      </a>
      <a href="{{ clinic_prague_booking_url }}" class="modal-option" target="_blank" rel="noopener" data-clinic="prague">
        <span class="modal-option-flag" aria-hidden="true">{{ clinic_prague_flag }}</span>
        <span class="modal-option-text">
          <span class="modal-option-name">{{ clinic_prague_name }}</span>
          <span class="modal-option-city">{{ clinic_prague_city }}</span>
        </span>
        <span class="modal-option-arrow" aria-hidden="true">→</span>
      </a>
    </div>
  </div>
</div>
